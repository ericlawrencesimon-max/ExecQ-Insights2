<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ExecQ Insights — Marketer Dashboard</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#eef0f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.page{display:flex;flex-direction:column;min-height:100vh}
.gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.gate-card{background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px;max-width:420px;width:100%;text-align:center}
.topbar{background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:28px;height:28px;border-radius:8px;background:#1a2640;border:1px solid rgba(236,191,90,0.3);display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-text{font-size:13px;font-weight:800;color:#eef0f7}
.logo-text span{color:#ecbf5a}
.badge{font-size:10px;font-weight:700;color:#ecbf5a;background:rgba(236,191,90,0.1);border:1px solid rgba(236,191,90,0.25);border-radius:20px;padding:3px 10px;letter-spacing:0.5px}
.nav-pills{display:flex;gap:4px}
.nav-pill{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s}
.nav-pill.active{background:rgba(236,191,90,0.12);color:#ecbf5a;border:1px solid rgba(236,191,90,0.3)}
.nav-pill.inactive{background:transparent;color:#6e7a96;border:1px solid transparent}
.nav-pill.inactive:hover{color:#eef0f7;background:rgba(255,255,255,0.04)}
.main{padding:28px 32px;max-width:1400px;margin:0 auto;width:100%}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px}
.stat-label{font-size:11px;font-weight:700;color:#6e7a96;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.stat-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-sub{font-size:11px;color:#6e7a96}
.card{background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:#eef0f7;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card-subtitle{font-size:11px;color:#6e7a96;font-weight:400;margin-left:8px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:11px;color:#6e7a96;width:110px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:6px;background:#1f2d4a;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.22,1,0.36,1)}
.bar-val{font-size:11px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
.dist-grid{display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:8px}
.dist-bar{flex:1;border-radius:4px 4px 0 0;cursor:pointer;position:relative}
.dist-bar:hover{opacity:0.8}
.dist-labels{display:flex;gap:6px}
.dist-label{flex:1;font-size:9px;color:#6e7a96;text-align:center}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.profile-card{background:#0d1117;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;cursor:pointer;transition:border-color 0.15s,transform 0.12s}
.profile-card:hover{border-color:rgba(236,191,90,0.3);transform:translateY(-1px)}
.profile-card.selected{border-color:#ecbf5a;background:rgba(236,191,90,0.04)}
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-select{background:#1a2640;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 10px;font-size:12px;color:#eef0f7;cursor:pointer;outline:none}
.filter-select:focus{border-color:rgba(236,191,90,0.4)}
.detail-panel{background:#0d1117;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px}
.goal-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(107,159,245,0.1);border:1px solid rgba(107,159,245,0.25);color:#6b9ff5;margin:2px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:700;color:#6e7a96;letter-spacing:0.5px;text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.07)}
.tbl td{font-size:12px;color:#eef0f7;padding:10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,0.02)}
.btn{display:inline-block;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:transform 0.12s,opacity 0.12s}
.btn:active{transform:scale(0.97);opacity:0.9}
.btn-gold{background:#ecbf5a;color:#0a0f1e}
input[type=text]{background:#1a2640;border-radius:10px;padding:12px 14px;font-size:14px;color:#eef0f7;border:1px solid rgba(255,255,255,0.08);width:100%;outline:none;transition:border-color 0.2s;font-family:inherit;margin-bottom:12px}
input:focus{border-color:rgba(236,191,90,0.4)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.live-dot{width:6px;height:6px;border-radius:3px;background:#34d470;display:inline-block;animation:pulse 2s ease-in-out infinite;margin-right:5px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}.profile-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
</style></head><body>
<div id="root"></div>
<script>
const CODES={EXECQINSIGHTS:{role:'internal',label:'Internal Team'},EXECQPARTNER:{role:'external',label:'Partner Access'}};
let S={authed:false,role:null,roleLabel:null,codeErr:false,view:'collective',selectedProfile:null,filterIndustry:'all',filterLevel:'all',filterGoal:'all',filterScore:'all',sortBy:'score'};
function ss(u){Object.assign(S,u);render();}
const W={linkedin:0.30,press:0.20,speaking:0.18,podcast:0.15,blog:0.10,board:0.07};
function calcIndex(sigs){
  const fl=sigs.linkedin?.followers||0,cl=sigs.linkedin?.connections||0,el=sigs.linkedin?.engagementRate||0;
  const fs=fl>0?Math.min(100,Math.log10(fl+1)/Math.log10(50000)*100):0;
  const cs=cl>0?Math.min(100,Math.log10(cl+1)/Math.log10(5000)*100):0;
  const es=Math.min(100,(el/10)*100);
  const sc={linkedin:Math.round(fs*0.4+cs*0.3+es*0.3),press:Math.round((Math.min(100,((sigs.press?.mentionCount||0)/50)*100)*0.5)+((sigs.press?.avgOutletAuthority||0)*0.5)),speaking:Math.round((Math.min(100,((sigs.speaking?.eventCount||0)/20)*100)*0.5)+((sigs.speaking?.avgEventTier||0)*0.5)),podcast:Math.round((Math.min(100,((sigs.podcast?.appearanceCount||0)/30)*100)*0.5)+(Math.min(100,((sigs.podcast?.avgAudienceSize||0)/100000)*100)*0.5)),blog:Math.round((Math.min(100,((sigs.blog?.articleCount||0)/40)*100)*0.5)+((sigs.blog?.avgPlatformAuthority||0)*0.5)),board:Math.min(100,Math.round(((sigs.board?.roleCount||0)/5)*100))};
  return{total:Math.round(sc.linkedin*W.linkedin+sc.press*W.press+sc.speaking*W.speaking+sc.podcast*W.podcast+sc.blog*W.blog+sc.board*W.board),scores:sc};
}
function getLevel(s){if(s>=70)return{label:'Board-Level Icon',color:'#ecbf5a'};if(s>=55)return{label:'Industry Authority',color:'#6b9ff5'};if(s>=40)return{label:'Rising Star',color:'#34d470'};if(s>=25)return{label:'Influencer Level',color:'#29c4b0'};if(s>=12)return{label:'Building Momentum',color:'#b0b8d0'};return{label:'Getting Started',color:'#6e7a96'};}
function getLevelShort(s){if(s>=70)return'Board Icon';if(s>=55)return'Authority';if(s>=40)return'Rising Star';if(s>=25)return'Influencer';if(s>=12)return'Building';return'Starting';}
function genSig(followers,connections,engagement,press,pressAuth,events,eventTier,podcasts,audience,articles,platAuth,board){return{linkedin:{followers,connections,engagementRate:engagement},press:{mentionCount:press,avgOutletAuthority:pressAuth},speaking:{eventCount:events,avgEventTier:eventTier},podcast:{appearanceCount:podcasts,avgAudienceSize:audience},blog:{articleCount:articles,avgPlatformAuthority:platAuth},board:{roleCount:board}};}
const DEMO_PROFILES=[
  {id:'d001',level:'c-suite',industry:'Technology',goals:['influence','board','speaking'],signals:genSig(42000,4800,6.2,38,82,14,72,22,62000,31,85,2),shared:true},
  {id:'d002',level:'vp',industry:'Technology',goals:['influence','content'],signals:genSig(18000,3400,4.8,14,65,6,58,8,18000,24,75,0),shared:true},
  {id:'d003',level:'c-suite',industry:'Financial Services',goals:['board','speaking','network'],signals:genSig(28000,4200,5.1,42,88,16,80,12,40000,18,72,3),shared:true},
  {id:'d004',level:'director',industry:'Healthcare',goals:['influence','content','speaking'],signals:genSig(6200,2100,3.4,9,52,5,45,4,8000,16,65,0),shared:true},
  {id:'d005',level:'vp',industry:'Media & Marketing',goals:['content','influence'],signals:genSig(22000,3800,5.8,22,70,8,60,14,32000,38,80,1),shared:true},
  {id:'d006',level:'c-suite',industry:'Healthcare',goals:['board','speaking'],signals:genSig(31000,4500,4.9,35,78,12,70,10,28000,14,68,2),shared:true},
  {id:'d007',level:'vp',industry:'Financial Services',goals:['influence','board'],signals:genSig(14000,3100,3.8,18,72,7,62,9,22000,20,70,1),shared:true},
  {id:'d008',level:'director',industry:'Technology',goals:['content','speaking'],signals:genSig(4800,1900,2.9,6,44,3,38,2,5000,12,58,0),shared:true},
  {id:'d009',level:'c-suite',industry:'Retail & Consumer',goals:['influence','content','network'],signals:genSig(19000,3600,4.2,24,68,9,58,16,35000,28,74,1),shared:true},
  {id:'d010',level:'vp',industry:'Professional Services',goals:['speaking','board'],signals:genSig(11000,2800,3.5,16,60,8,65,7,18000,22,68,1),shared:true},
  {id:'d011',level:'c-suite',industry:'Technology',goals:['board','speaking','influence'],signals:genSig(52000,4900,7.1,48,91,18,85,28,88000,36,90,3),shared:true},
  {id:'d012',level:'director',industry:'Media & Marketing',goals:['content','influence'],signals:genSig(8400,2400,4.1,11,55,4,42,6,12000,22,70,0),shared:true},
  {id:'d013',level:'vp',industry:'Healthcare',goals:['influence','speaking'],signals:genSig(9800,2600,3.2,12,58,6,50,5,14000,18,62,0),shared:true},
  {id:'d014',level:'c-suite',industry:'Professional Services',goals:['board','network'],signals:genSig(24000,4100,4.6,30,80,11,74,8,24000,16,70,2),shared:true},
  {id:'d015',level:'vp',industry:'Technology',goals:['content','influence','speaking'],signals:genSig(16000,3200,5.2,19,68,9,62,12,28000,32,78,1),shared:true},
  {id:'d016',level:'director',industry:'Financial Services',goals:['influence','network'],signals:genSig(5400,2000,2.8,7,48,3,40,3,7000,10,55,0),shared:true},
  {id:'d017',level:'c-suite',industry:'Manufacturing',goals:['board','speaking'],signals:genSig(15000,3500,3.8,20,72,8,65,6,18000,12,62,2),shared:true},
  {id:'d018',level:'vp',industry:'Retail & Consumer',goals:['content','influence'],signals:genSig(12000,2900,4.4,14,60,5,48,10,22000,26,72,0),shared:true},
  {id:'d019',level:'director',industry:'Professional Services',goals:['speaking','content'],signals:genSig(4200,1800,3.1,5,42,4,44,3,8000,14,60,0),shared:true},
  {id:'d020',level:'c-suite',industry:'Media & Marketing',goals:['influence','content','board'],signals:genSig(38000,4600,6.4,44,86,15,78,24,72000,42,88,2),shared:true},
  {id:'d021',level:'vp',industry:'Manufacturing',goals:['speaking','network'],signals:genSig(7800,2300,2.6,10,54,6,55,4,10000,8,52,1),shared:true},
  {id:'d022',level:'director',industry:'Healthcare',goals:['content','influence'],signals:genSig(5800,2100,3.6,8,50,3,38,4,9000,18,64,0),shared:true},
  {id:'d023',level:'c-suite',industry:'Technology',goals:['board','influence','speaking'],signals:genSig(44000,4700,5.8,40,84,16,80,20,58000,28,82,3),shared:true},
  {id:'d024',level:'vp',industry:'Healthcare',goals:['board','speaking'],signals:genSig(10500,2700,3.4,15,64,7,58,6,16000,14,60,1),shared:true},
  {id:'d025',level:'director',industry:'Technology',goals:['influence','content'],signals:genSig(6800,2200,3.8,8,48,4,42,3,7000,16,62,0),shared:true},
  {id:'d026',level:'c-suite',industry:'Financial Services',goals:['board','network','speaking'],signals:genSig(33000,4400,5.4,36,84,13,76,14,44000,20,74,3),shared:true},
  {id:'d027',level:'vp',industry:'Retail & Consumer',goals:['influence','content','speaking'],signals:genSig(13500,3000,4.6,16,62,7,54,11,26000,30,74,1),shared:true},
  {id:'d028',level:'director',industry:'Manufacturing',goals:['speaking','network'],signals:genSig(3800,1700,2.4,4,40,3,36,2,5000,6,48,0),shared:true},
  {id:'d029',level:'c-suite',industry:'Professional Services',goals:['board','influence'],signals:genSig(21000,3900,4.4,28,76,10,70,9,26000,16,68,2),shared:true},
  {id:'d030',level:'vp',industry:'Media & Marketing',goals:['content','influence','speaking'],signals:genSig(17500,3300,5.6,20,66,8,58,15,34000,36,80,1),shared:true},
];
DEMO_PROFILES.forEach(p=>{const ir=calcIndex(p.signals);p.score=ir.total;p.scores=ir.scores;p.source='demo';});
function loadRealProfiles(){const profiles=[];try{for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(!key||!key.startsWith('execq_user_'))continue;const data=JSON.parse(localStorage.getItem(key)||'{}');if(!data.shareEcosystem||!data.indexResult)continue;const level=data.title?((t=>{const tl=t.toLowerCase();if(tl.includes('ceo')||tl.includes('founder')||tl.includes('chief'))return'c-suite';if(tl.includes('svp')||tl.includes('vp')||tl.includes('president'))return'vp';if(tl.includes('director')||tl.includes('head of'))return'director';return'manager';})(data.title)):'vp';profiles.push({id:'real_'+key.replace('execq_user_','').slice(0,8),level,industry:data.industry||'Technology',goals:data.goals||[],signals:data.signals||{},score:data.indexResult.total,scores:data.indexResult.scores||{},source:'real',shared:true});}}catch(e){}return profiles;}
function getAllProfiles(){return[...loadRealProfiles(),...DEMO_PROFILES];}
function getFiltered(){let p=getAllProfiles();if(S.filterIndustry!=='all')p=p.filter(x=>x.industry===S.filterIndustry);if(S.filterLevel!=='all')p=p.filter(x=>x.level===S.filterLevel);if(S.filterGoal!=='all')p=p.filter(x=>(x.goals||[]).includes(S.filterGoal));if(S.filterScore!=='all'){const r={'0-24':[0,24],'25-39':[25,39],'40-54':[40,54],'55-69':[55,69],'70+':[70,100]};const[mn,mx]=r[S.filterScore]||[0,100];p=p.filter(x=>x.score>=mn&&x.score<=mx);}p.sort((a,b)=>S.sortBy==='score'?b.score-a.score:a.level.localeCompare(b.level));return p;}
function getAnalytics(profiles){if(!profiles.length)return null;const scores=profiles.map(p=>p.score);const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);const top10=scores.filter(s=>s>=70).length;const industries=[...new Set(profiles.map(p=>p.industry))];const sigAvg={};['linkedin','press','speaking','podcast','blog','board'].forEach(k=>{const vals=profiles.map(p=>p.scores[k]||0);sigAvg[k]=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);});const buckets=[0,0,0,0,0];scores.forEach(s=>{if(s>=70)buckets[4]++;else if(s>=55)buckets[3]++;else if(s>=40)buckets[2]++;else if(s>=25)buckets[1]++;else buckets[0]++;});const indMap={};profiles.forEach(p=>{indMap[p.industry]=(indMap[p.industry]||0)+1;});const indBreakdown=Object.entries(indMap).sort((a,b)=>b[1]-a[1]);const lvlMap={};profiles.forEach(p=>{lvlMap[p.level]=(lvlMap[p.level]||0)+1;});const goalMap={};profiles.forEach(p=>(p.goals||[]).forEach(g=>{goalMap[g]=(goalMap[g]||0)+1;}));const goalBreakdown=Object.entries(goalMap).sort((a,b)=>b[1]-a[1]);return{avg,top10,industries,sigAvg,buckets,indBreakdown,lvlMap,goalBreakdown,total:profiles.length};}
const SRCS=[{key:'linkedin',label:'LinkedIn',color:'#0a66c2'},{key:'press',label:'Press',color:'#ecbf5a'},{key:'speaking',label:'Speaking',color:'#6b9ff5'},{key:'podcast',label:'Podcast',color:'#29c4b0'},{key:'blog',label:'Blog',color:'#34d470'},{key:'board',label:'Board',color:'#e05a7a'}];
const GOAL_LABELS={influence:'Influence',speaking:'Speaking',board:'Board',network:'Network',content:'Content'};
const GOAL_ICONS={influence:'📣',speaking:'🎤',board:'🏛',network:'🤝',content:'✍️'};
const LEVEL_LABELS={'c-suite':'C-Suite','vp':'VP/SVP','director':'Director','manager':'Manager'};
const LEVEL_COLORS={'c-suite':'#ecbf5a','vp':'#6b9ff5','director':'#29c4b0','manager':'#b0b8d0'};
function render(){document.getElementById('root').innerHTML=S.authed?renderDashboard():renderGate();setTimeout(()=>{document.querySelectorAll('[data-bar]').forEach(el=>{const w=el.dataset.bar;el.style.width='0%';setTimeout(()=>{el.style.width=w+'%';},50);});},60);}
function renderGate(){
  return '<div class="gate"><div class="gate-card">'
    +'<div style="width:52px;height:52px;border-radius:16px;background:#1a2640;border:1px solid rgba(236,191,90,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px">&#9889;</div>'
    +'<div style="font-size:8px;color:#3a4660;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">ExecQ Intelligence</div>'
    +'<p style="font-size:22px;font-weight:800;color:#eef0f7;margin-bottom:6px">Insights Dashboard</p>'
    +'<p style="font-size:13px;color:#6e7a96;margin-bottom:28px;line-height:1.6">Anonymized executive intelligence for authorised partners.</p>'
    +'<input type="text" id="code-input" placeholder="Enter access code" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" style="text-align:center;letter-spacing:3px;font-weight:700;font-size:15px;text-transform:uppercase">'
    +(S.codeErr?'<p style="color:#e05a7a;font-size:13px;margin-top:8px;margin-bottom:4px">Invalid access code. Please try again.</p>':'<p style="margin-bottom:4px">&nbsp;</p>')
    +'<button class="btn btn-gold" style="width:100%;margin-top:8px" onclick="checkCode()">Access Dashboard &rarr;</button>'
    +'<p style="font-size:11px;color:#3a4660;margin-top:16px">Authorised partners only &middot; All data anonymised</p>'
    +'</div></div>';
}
function checkCode(){const el=document.getElementById('code-input');const input=(el?el.value:'').trim().toUpperCase();const match=CODES[input];if(match){ss({authed:true,role:match.role,roleLabel:match.label});}else{ss({codeErr:true});}}
function renderDashboard(){return'<div class="page">'+renderTopbar()+'<div class="main">'+(S.view==='collective'?renderCollective():renderProfiles())+'</div></div>';}
function renderTopbar(){const all=getAllProfiles();const real=all.filter(p=>p.source==='real').length;return'<div class="topbar">'+'<div class="logo"><div class="logo-icon">&#9889;</div><div class="logo-text"><span>ExecQ</span> Insights</div><span class="badge" style="margin-left:10px">'+S.roleLabel+'</span></div>'+'<div class="nav-pills"><button class="nav-pill '+(S.view==='collective'?'active':'inactive')+'" onclick="ss({view:\'collective\'})">&#128202; Collective</button><button class="nav-pill '+(S.view==='profiles'?'active':'inactive')+'" onclick="ss({view:\'profiles\',selectedProfile:null})">&#128100; Profiles</button></div>'+'<div style="display:flex;align-items:center;gap:14px"><div style="font-size:11px;color:#6e7a96"><span class="live-dot"></span>'+all.length+' executives'+(real>0?' · '+real+' live':'')+'</div><button onclick="ss({authed:false})" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;color:#6e7a96;cursor:pointer">Sign Out</button></div></div>';}
function statCard(label,val,sub,color){return'<div class="stat-card"><p class="stat-label">'+label+'</p><p class="stat-val" style="color:'+color+'">'+val+'</p><p class="stat-sub">'+sub+'</p></div>';}
function renderCollective(){const all=getAllProfiles();const a=getAnalytics(all);if(!a)return'<p>No data.</p>';const statCards='<div class="stat-grid">'+statCard('Total Executives',a.total,'Opted-in to ecosystem','#ecbf5a')+statCard('Avg ExecQ Index',a.avg,'/100 across all profiles','#6b9ff5')+statCard('Board-Level Icons',a.top10,'Scoring 70+ on the index','#34d470')+statCard('Industries',a.industries.length,'Represented in dataset','#29c4b0')+'</div>';const maxB=Math.max(...a.buckets);const bColors=['#6e7a96','#b0b8d0','#29c4b0','#6b9ff5','#ecbf5a'];const bLabels=['0-24','25-39','40-54','55-69','70+'];const distChart='<div class="card"><div class="card-title">Score Distribution<span class="card-subtitle">'+a.total+' executives</span></div><div class="dist-grid">'+a.buckets.map((n,i)=>{const h=maxB>0?Math.max(8,Math.round((n/maxB)*80)):8;return'<div class="dist-bar" style="height:'+h+'px;background:'+bColors[i]+';opacity:0.85" title="'+n+' executives"></div>';}).join('')+'</div><div class="dist-labels">'+bLabels.map((l,i)=>'<div class="dist-label" style="color:'+bColors[i]+'">'+l+'<br><span style="color:#eef0f7;font-weight:700">'+a.buckets[i]+'</span></div>').join('')+'</div></div>';const sigChart='<div class="card"><div class="card-title">Average Signal Scores</div>'+SRCS.map(s=>'<div class="bar-row"><span class="bar-label">'+s.label+'</span><div class="bar-track"><div class="bar-fill" data-bar="'+a.sigAvg[s.key]+'" style="background:'+s.color+';width:0%"></div></div><span class="bar-val" style="color:'+s.color+'">'+a.sigAvg[s.key]+'</span></div>').join('')+'</div>';const indChart='<div class="card"><div class="card-title">By Industry</div>'+a.indBreakdown.map(([ind,n])=>'<div class="bar-row"><span class="bar-label" style="font-size:10px">'+ind+'</span><div class="bar-track"><div class="bar-fill" data-bar="'+Math.round(n/a.total*100)+'" style="background:#6b9ff5;width:0%"></div></div><span class="bar-val">'+n+'</span></div>').join('')+'</div>';const levels=['c-suite','vp','director','manager'];const lvlChart='<div class="card"><div class="card-title">By Seniority</div><div style="display:flex;gap:10px;flex-wrap:wrap">'+levels.map(l=>{const n=a.lvlMap[l]||0;const pct=a.total>0?Math.round(n/a.total*100):0;return'<div style="flex:1;min-width:80px;background:#0d1117;border-radius:10px;padding:12px;text-align:center;border:1px solid rgba(255,255,255,0.06)"><p style="font-size:22px;font-weight:800;color:'+LEVEL_COLORS[l]+';line-height:1">'+n+'</p><p style="font-size:10px;color:#6e7a96;margin-top:3px">'+LEVEL_LABELS[l]+'</p><p style="font-size:10px;color:#3a4660;margin-top:2px">'+pct+'%</p></div>';}).join('')+'</div></div>';const goalChart='<div class="card"><div class="card-title">Executive Goals</div>'+a.goalBreakdown.map(([g,n])=>'<div class="bar-row"><span class="bar-label">'+(GOAL_ICONS[g]||'')+' '+(GOAL_LABELS[g]||g)+'</span><div class="bar-track"><div class="bar-fill" data-bar="'+Math.round(n/a.total*100)+'" style="background:#ecbf5a;width:0%"></div></div><span class="bar-val">'+n+'</span></div>').join('')+'</div>';const gapTable='<div class="card"><div class="card-title">Signal Gap Analysis<span class="card-subtitle">vs top performers</span></div><table class="tbl"><thead><tr><th>Signal</th><th>Avg</th><th>Top 20% Avg</th><th>Gap</th><th>Opportunity</th></tr></thead><tbody>'+SRCS.map(s=>{const avg=a.sigAvg[s.key];const top20=all.filter(p=>p.score>=60).map(p=>p.scores[s.key]||0);const t20avg=top20.length?Math.round(top20.reduce((a,b)=>a+b,0)/top20.length):0;const gap=t20avg-avg;const opp=gap>20?'High':gap>10?'Medium':'Low';const oc=gap>20?'#e05a7a':gap>10?'#ecbf5a':'#34d470';return'<tr><td style="color:'+s.color+';font-weight:700">'+s.label+'</td><td>'+avg+'</td><td>'+t20avg+'</td><td style="color:'+(gap>0?'#e05a7a':'#34d470')+'">'+(gap>0?'+'+gap:gap)+'</td><td><span style="color:'+oc+';font-weight:700">'+opp+'</span></td></tr>';}).join('')+'</tbody></table></div>';return statCards+'<div class="two-col">'+distChart+sigChart+'</div>'+'<div class="two-col">'+indChart+goalChart+'</div>'+'<div class="two-col">'+lvlChart+gapTable+'</div>';}
function renderProfiles(){const profiles=getFiltered();const all=getAllProfiles();const industries=[...new Set(all.map(p=>p.industry))].sort();const filters='<div class="filters">'+filterSel('filterIndustry','All Industries',industries.map(i=>({v:i,l:i})))+filterSel('filterLevel','All Levels',[{v:'c-suite',l:'C-Suite'},{v:'vp',l:'VP/SVP'},{v:'director',l:'Director'},{v:'manager',l:'Manager'}])+filterSel('filterGoal','All Goals',[{v:'influence',l:'Influence'},{v:'speaking',l:'Speaking'},{v:'board',l:'Board'},{v:'network',l:'Network'},{v:'content',l:'Content'}])+filterSel('filterScore','All Scores',[{v:'0-24',l:'0-24'},{v:'25-39',l:'25-39'},{v:'40-54',l:'40-54'},{v:'55-69',l:'55-69'},{v:'70+',l:'70+'}])+'<select class="filter-select" onchange="ss({sortBy:this.value})"><option value="score" '+(S.sortBy==='score'?'selected':'')+'>Sort: Score</option><option value="level" '+(S.sortBy==='level'?'selected':'')+'>Sort: Level</option></select><span style="font-size:12px;color:#6e7a96;padding:6px 4px">'+profiles.length+' profiles</span></div>';if(S.selectedProfile){const p=profiles.find(x=>x.id===S.selectedProfile)||profiles[0];if(p)return filters+renderProfileDetail(p,profiles);}return filters+'<div class="profile-grid">'+profiles.map(p=>renderProfileCard(p)).join('')+'</div>';}
function filterSel(key,ph,opts){return'<select class="filter-select" onchange="ss({'+key+':this.value,selectedProfile:null})"><option value="all">'+ph+'</option>'+opts.map(o=>'<option value="'+o.v+'" '+(S[key]===o.v?'selected':'')+'>'+o.l+'</option>').join('')+'</select>';}
function renderProfileCard(p){const lv=getLevel(p.score);const lc=LEVEL_COLORS[p.level]||'#6e7a96';const isSel=S.selectedProfile===p.id;return'<div class="profile-card '+(isSel?'selected':'')+'" onclick="ss({selectedProfile:\''+p.id+'\'})">'+'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:9px;background:'+lc+'18;border:1px solid '+lc+'44;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:'+lc+'">'+(LEVEL_LABELS[p.level]||'?').slice(0,1)+'</div><div><p style="font-size:12px;font-weight:700;color:#eef0f7">'+LEVEL_LABELS[p.level]+'</p><p style="font-size:10px;color:#6e7a96">'+p.industry+'</p></div></div><div style="text-align:right"><p style="font-size:22px;font-weight:800;color:'+lv.color+';line-height:1">'+p.score+'</p><p style="font-size:9px;color:'+lv.color+';font-weight:600">'+getLevelShort(p.score)+'</p></div></div>'+'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'+(p.goals||[]).slice(0,3).map(g=>'<span style="font-size:9px;padding:2px 7px;border-radius:20px;background:rgba(107,159,245,0.1);border:1px solid rgba(107,159,245,0.2);color:#6b9ff5">'+(GOAL_LABELS[g]||g)+'</span>').join('')+'</div>'+'<div style="display:flex;gap:4px">'+SRCS.map(s=>{const v=p.scores[s.key]||0;return'<div style="flex:1;height:3px;border-radius:2px;background:'+(v>40?s.color:'#1f2d4a')+'"></div>';}).join('')+'</div>'+(p.source==='real'?'<div style="margin-top:8px;display:flex;align-items:center;gap:4px"><div class="live-dot" style="width:5px;height:5px"></div><span style="font-size:9px;color:#34d470">Live</span></div>':'')+'</div>';}
function renderProfileDetail(p,all){const lv=getLevel(p.score);const lc=LEVEL_COLORS[p.level]||'#6e7a96';const similar=all.filter(x=>x.id!==p.id&&x.level===p.level&&x.industry===p.industry);const peerAvg=similar.length?Math.round(similar.map(x=>x.score).reduce((a,b)=>a+b,0)/similar.length):null;const left='<div>'+'<div class="detail-panel" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:48px;height:48px;border-radius:14px;background:'+lc+'18;border:1px solid '+lc+'40;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:'+lc+'">'+(LEVEL_LABELS[p.level]||'?').slice(0,1)+'</div><div><p style="font-size:15px;font-weight:800;color:#eef0f7">'+LEVEL_LABELS[p.level]+'</p><p style="font-size:12px;color:#6e7a96">'+p.industry+(p.source==='real'?' · <span style="color:#34d470">Live</span>':'')+'</p></div><div style="margin-left:auto;text-align:right"><p style="font-size:44px;font-weight:800;line-height:1;color:'+lv.color+'">'+p.score+'</p><p style="font-size:11px;font-weight:600;color:'+lv.color+'">'+lv.label+'</p></div></div>'+(peerAvg!==null?'<div style="background:#111827;border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span style="font-size:11px;color:#6e7a96">vs '+similar.length+' similar peers</span><span style="font-size:13px;font-weight:700;color:'+(p.score>peerAvg?'#34d470':'#e05a7a')+'">'+(p.score>peerAvg?'▲ +'+(p.score-peerAvg):'▼ '+(peerAvg-p.score))+' vs peer avg '+peerAvg+'</span></div>':'')+'<p style="font-size:10px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Goals</p><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">'+(p.goals||[]).map(g=>'<span class="goal-tag">'+(GOAL_ICONS[g]||'')+' '+(GOAL_LABELS[g]||g)+'</span>').join('')+'</div><p style="font-size:10px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Executive ID</p><p style="font-size:12px;color:#3a4660;font-family:monospace">'+p.id+'</p></div>'+'<div class="detail-panel"><p style="font-size:10px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Signal Breakdown</p>'+SRCS.map(s=>{const v=p.scores[s.key]||0;const ps=similar.length?Math.round(similar.map(x=>x.scores[s.key]||0).reduce((a,b)=>a+b,0)/similar.length):null;return'<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:'+s.color+'">'+s.label+'</span><div style="display:flex;align-items:center;gap:8px">'+(ps!==null?'<span style="font-size:10px;color:#3a4660">peer:'+ps+'</span>':'')+'<span style="font-size:13px;font-weight:800;color:'+s.color+'">'+v+'</span></div></div><div style="height:5px;background:#1a2640;border-radius:3px;overflow:hidden"><div data-bar="'+v+'" style="height:100%;border-radius:3px;background:'+s.color+';width:0%"></div></div></div>';}).join('')+'</div></div>';const right='<div><div class="detail-panel" style="margin-bottom:12px"><p style="font-size:10px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Opportunity Analysis</p>'+(()=>{const sorted=SRCS.map(s=>({...s,v:p.scores[s.key]||0})).sort((a,b)=>a.v-b.v);return'<p style="font-size:11px;font-weight:700;color:#e05a7a;margin-bottom:6px">Weakest signals</p>'+sorted.slice(0,2).map(s=>'<div style="background:#111827;border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:600;color:'+s.color+'">'+s.label+'</span><span style="font-size:12px;font-weight:700;color:'+s.color+'">'+s.v+'/100</span></div>').join('')+'<p style="font-size:11px;font-weight:700;color:#34d470;margin-bottom:6px;margin-top:10px">Strongest signals</p>'+sorted.slice(-2).reverse().map(s=>'<div style="background:#111827;border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:600;color:'+s.color+'">'+s.label+'</span><span style="font-size:12px;font-weight:700;color:'+s.color+'">'+s.v+'/100</span></div>').join('');})()+'</div><div class="detail-panel"><p style="font-size:10px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Marketer Fit Score</p>'+(()=>{const fits={influence:{label:'Thought Leadership',score:Math.round((p.scores.linkedin+p.scores.blog)/2)},speaking:{label:'Event Targeting',score:p.scores.speaking},board:{label:'Board Advisory',score:p.scores.board>0?Math.min(100,p.scores.board+p.score/2):20},content:{label:'Content Amplification',score:Math.round((p.scores.blog+p.scores.linkedin)/2)},network:{label:'Community Products',score:Math.round((p.scores.linkedin+p.score)/2)}};return(p.goals||[]).map(g=>{const f=fits[g];if(!f)return'';const pct=Math.min(100,f.score);const col=pct>70?'#34d470':pct>40?'#ecbf5a':'#e05a7a';return'<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#b0b8d0">'+f.label+'</span><span style="font-size:11px;font-weight:700;color:'+col+'">'+pct+'%</span></div><div style="height:4px;background:#1a2640;border-radius:2px;overflow:hidden"><div data-bar="'+pct+'" style="height:100%;border-radius:2px;background:'+col+';width:0%"></div></div></div>';}).join('');})()+'</div></div>';return'<button onclick="ss({selectedProfile:null})" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:#6e7a96;cursor:pointer;margin-bottom:16px">&#8592; Back to profiles</button><button onclick="openAlertForm(this.dataset.pid)" data-pid="'+p.id+'" style="margin-left:10px;background:#ecbf5a;border:none;border-radius:8px;padding:6px 18px;font-size:13px;font-weight:800;color:#0a0f1e;cursor:pointer">&#9889; Express Interest</button><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+left+right+'</div>';}
render();
const OPP_TYPES_I=[{id:'executive_search',label:'Executive Search'},{id:'board_opportunity',label:'Board Opportunity'},{id:'advisory_role',label:'Advisory Role'},{id:'speaking_engagement',label:'Speaking Engagement'},{id:'media_press',label:'Media / Press'},{id:'partnership',label:'Partnership'}];var AI={open:false,pid:null,submitted:false,oppType:'executive_search',firmName:'',description:'',contactEmail:''};function openAlertForm(pid){AI={open:true,pid:pid,submitted:false,oppType:'executive_search',firmName:'',description:'',contactEmail:''};showAF();}function closeAlertForm(){AI.open=false;var el=document.getElementById('af');if(el)el.innerHTML='';}function setOT(t){var fi=document.getElementById('af-firm');var di=document.getElementById('af-desc');var ei=document.getElementById('af-email');if(fi)AI.firmName=fi.value;if(di)AI.description=di.value;if(ei)AI.contactEmail=ei.value;AI.oppType=t;showAF();setTimeout(function(){var f=document.getElementById('af-firm');var d=document.getElementById('af-desc');var e=document.getElementById('af-email');if(f)f.value=AI.firmName;if(d)d.value=AI.description;if(e)e.value=AI.contactEmail;},10);}function submitAlert(){var fi=document.getElementById('af-firm');var di=document.getElementById('af-desc');var ei=document.getElementById('af-email');var firm=fi?fi.value.trim():'';var desc=di?di.value.trim():'';var email=ei?ei.value.trim():'';if(!firm||!desc||!email){alert('Please fill in all fields.');return;}var obj={id:'alert_'+Date.now(),profileId:AI.pid,oppType:AI.oppType,firmName:firm,description:desc,contactEmail:email,sentAt:new Date().toISOString(),status:'pending'};var key='execq_alerts_'+AI.pid;var existing=[];try{existing=JSON.parse(localStorage.getItem(key)||'[]');}catch(e){}existing.push(obj);localStorage.setItem(key,JSON.stringify(existing));AI.submitted=true;showAF();}function showAF(){var el=document.getElementById('af');if(!el||!AI.open){if(el)el.innerHTML='';return;}var pills=OPP_TYPES_I.map(function(t){var on=t.id===AI.oppType;return'<div onclick="setOT(this.dataset.t)" data-t="'+t.id+'" style="padding:7px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;background:'+(on?'rgba(236,191,90,0.12)':'#1a2640')+';border:1px solid '+(on?'rgba(236,191,90,0.4)':'rgba(255,255,255,0.08)')+';color:'+(on?'#ecbf5a':'#6e7a96')+'">'+t.label+'</div>';}).join('');var inner=AI.submitted?'<div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:16px">✓</div><p style="font-size:18px;font-weight:800;color:#eef0f7;margin-bottom:8px">Alert Sent</p><p style="font-size:13px;color:#6e7a96;line-height:1.6;margin-bottom:20px">The executive will be notified. Your identity stays hidden until they choose to connect.</p><button onclick="closeAlertForm()" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px;font-size:13px;font-weight:700;color:#6e7a96;cursor:pointer">Close</button></div>':'<div style="margin-bottom:14px"><p style="font-size:11px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Opportunity Type</p><div style="display:flex;flex-wrap:wrap;gap:8px">'+pills+'</div></div><div style="margin-bottom:14px"><label style="font-size:11px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:8px">Your Firm</label><input type="text" id="af-firm" placeholder="e.g. Korn Ferry" autocomplete="off" style="width:100%;background:#1a2640;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-size:14px;color:#eef0f7;outline:none;box-sizing:border-box"></div><div style="margin-bottom:14px"><label style="font-size:11px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:8px">Opportunity Description</label><textarea id="af-desc" placeholder="Brief description — the executive sees this before deciding to connect..." style="width:100%;background:#1a2640;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-size:13px;color:#eef0f7;outline:none;min-height:80px;resize:vertical;font-family:inherit;box-sizing:border-box"></textarea></div><div style="margin-bottom:20px"><label style="font-size:11px;font-weight:700;color:#6e7a96;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px">Your Contact Email</label><p style="font-size:11px;color:#3a4660;margin-bottom:7px">Only revealed if the executive chooses to connect</p><input type="email" id="af-email" placeholder="you@yourfirm.com" autocomplete="off" style="width:100%;background:#1a2640;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-size:14px;color:#eef0f7;outline:none;box-sizing:border-box"></div><button onclick="submitAlert()" style="width:100%;background:#ecbf5a;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;color:#0a0f1e;cursor:pointer">Send Opportunity Alert</button>';el.innerHTML='<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px" onclick="closeAlertForm()"><div style="background:#111827;border-radius:20px;padding:28px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px"><div><p style="font-size:18px;font-weight:800;color:#eef0f7">Express Interest</p><p style="font-size:12px;color:#6e7a96;margin-top:3px">Your identity stays hidden until the executive connects</p></div><button onclick="closeAlertForm()" style="background:rgba(255,255,255,0.06);border:none;border-radius:10px;width:32px;height:32px;color:#6e7a96;cursor:pointer;font-size:16px;flex-shrink:0;margin-left:12px">x</button></div>'+inner+'</div></div>';}
